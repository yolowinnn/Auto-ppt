<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Slide 03 v2 — dark theme, html2pptx-safe</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 1280px; height: 720px; position: relative;
  font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
  color: #1a1a1a; background: #ffffff; overflow: hidden;
}

.bg {
  position: absolute; left: 0; top: 0;
  width: 1280px; height: 720px;
  background-color: #064e3b;
}

.bg-accent {
  position: absolute; left: 0; top: 0;
  width: 6px; height: 720px;
  background-color: #10b981;
}

.slide { position: absolute; left: 0; top: 0; width: 1280px; height: 720px; padding: 64px 64px 64px 80px; }

.hero { display: flex; align-items: center; gap: 18px; margin-bottom: 12px; }
.hero .icon { width: 48px; height: 48px; object-fit: contain; }
.hero .title {
  font-size: 40px; font-weight: 700; color: #ffffff;
  letter-spacing: -0.5px;
}

.sub { font-size: 20px; color: #d1fae5; margin-bottom: 40px; }

.card-grid {
  display: flex; gap: 24px;
}

.card {
  flex: 1;
  padding: 28px;
  background-color: #065f46;
  border: 1px solid #047857;
  border-radius: 16px;
  position: relative;
}

.card-accent {
  position: absolute; left: 0; top: 0;
  width: 100%; height: 4px;
  background-color: #10b981;
  border-radius: 16px 16px 0 0;
}

.card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-top: 4px; }
.card-header .badge-icon { width: 36px; height: 36px; object-fit: contain; }
.card-header h3 { font-size: 22px; font-weight: 600; color: #ffffff; }

.card p {
  font-size: 16px; color: #a7f3d0; line-height: 1.6;
  min-height: 76px;
}

.pill {
  display: inline-block;
  padding: 6px 14px;
  border-radius: 999px;
  background-color: #064e3b;
  border: 1px solid #34d399;
  color: #6ee7b7;
  font-size: 13px;
  margin-top: 14px;
}

.footer {
  position: absolute; left: 80px; right: 64px; bottom: 28px;
  font-size: 12px; color: #6ee7b7;
  text-align: center;
}
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="bg-accent"></div>

  <div class="slide">
    <div class="hero">
      <img class="icon" src="icons/chart.svg" alt="chart">
      <span class="title">IndustrialMind AI · 季度成果</span>
    </div>
    <p class="sub"><span>三大核心能力进入生产部署，客户验收节点全部按时完成</span></p>

    <div class="card-grid">
      <div class="card">
        <div class="card-accent"></div>
        <div class="card-header">
          <img class="badge-icon" src="icons/check.svg" alt="check">
          <h3><span>视觉检测准确率</span></h3>
        </div>
        <p><span>拉线方向识别 94.7%、装配异常检出 91.2%；两条产线累计运行 480 小时无误报</span></p>
        <span class="pill"><span>+6.5pp vs Q1</span></span>
      </div>

      <div class="card">
        <div class="card-accent"></div>
        <div class="card-header">
          <img class="badge-icon" src="icons/clock.svg" alt="clock">
          <h3><span>实时推理延迟</span></h3>
        </div>
        <p><span>边缘端 p50 312ms / p95 480ms，稳定低于客户 500ms 节拍要求</span></p>
        <span class="pill"><span>−38% vs Q1</span></span>
      </div>
    </div>

    <p class="footer"><span>© 2026 IndustrialMind AI · All Rights Reserved · Internal Use Only</span></p>
  </div>
</body>
</html>
